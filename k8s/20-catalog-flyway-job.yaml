# ============================================================================
#  Migraciones del catalog-service (Flyway como Job de Kubernetes)
# ============================================================================
#
#  Un Job corre hasta completarse y termina (no es un servicio permanente).
#  Aplica las migraciones de catalog-service/db/migrations contra catalog-db.
#  Los .sql llegan montados desde el ConfigMap `catalog-migrations`
#  (lo crea el Makefile con: kubectl create configmap ... --from-file).
#
#  FLYWAY_CONNECT_RETRIES hace que Flyway espere a que la base acepte conexiones,
#  así no importa si el Job arranca antes que PostgreSQL esté listo.
# ----------------------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-flyway
  namespace: incidentes
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: flyway
          image: flyway/flyway:10-alpine
          args: ["migrate"]
          env:
            - name: FLYWAY_URL
              value: jdbc:postgresql://catalog-db:5432/catalog
            - name: FLYWAY_USER
              value: postgres
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: FLYWAY_CONNECT_RETRIES
              value: "60"
            - name: FLYWAY_LOCATIONS
              value: filesystem:/flyway/sql
          volumeMounts:
            - name: migrations
              mountPath: /flyway/sql
      volumes:
        - name: migrations
          configMap:
            name: catalog-migrations
