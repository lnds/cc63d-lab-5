# La contraseña de las bases NO va en los manifiestos de las apps ni en la imagen.
# Vive en un Secret y se inyecta como variable de entorno (stringData = texto plano
# que Kubernetes codifica a base64 al guardarlo).
#
# Nota: un Secret de Kubernetes NO está cifrado por defecto, solo está en base64.
# En producción se usa un gestor real (Sealed Secrets, Vault, Secret Manager).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: incidentes
type: Opaque
stringData:
  POSTGRES_PASSWORD: dev
