# ============================================================================
#  incidents-service (Python) — ConfigMap + Deployment + Service
# ============================================================================
#
#  Las URLs de las dependencias van en un ConfigMap (configuración no secreta).
#  El Service es NodePort para poder abrirlo desde fuera con `minikube service`.
# ----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: incidents-config
  namespace: incidentes
data:
  CATALOG_URL: http://catalog-service:8080
  NOTIFICATIONS_URL: http://notifications-service:8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incidents-service
  namespace: incidentes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: incidents-service
  template:
    metadata:
      labels:
        app: incidents-service
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z incidents-db 5432; do echo esperando incidents-db; sleep 2; done"]
      containers:
        - name: incidents
          image: incidents-service:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://postgres:$(POSTGRES_PASSWORD)@incidents-db:5432/incidents
          # Las URLs de catalog y notifications entran desde el ConfigMap.
          envFrom:
            - configMapRef:
                name: incidents-config
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: incidents-service
  namespace: incidentes
spec:
  type: NodePort
  selector:
    app: incidents-service
  ports:
    - port: 8080
      targetPort: 8080
